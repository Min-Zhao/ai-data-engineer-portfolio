services:
  pharma-api:
    build:
      context: ./apps/pharma-research-agent
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"

  pharma-web:
    build:
      context: ./apps/pharma-research-agent
      dockerfile: Dockerfile.frontend
    depends_on:
      - pharma-api
    ports:
      - "5173:5173"

  literature-api:
    image: python:3.12-slim
    working_dir: /app/backend
    volumes:
      - ./apps/literature-evidence-map:/app
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8010"
    ports:
      - "8010:8010"

  literature-web:
    image: node:22-slim
    working_dir: /app/frontend
    volumes:
      - ./apps/literature-evidence-map:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - literature-api
    ports:
      - "5174:5174"

  assay-api:
    image: python:3.12-slim
    working_dir: /app/backend
    volumes:
      - ./apps/assay-prioritization-console:/app
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8020"
    ports:
      - "8020:8020"

  assay-web:
    image: node:22-slim
    working_dir: /app/frontend
    volumes:
      - ./apps/assay-prioritization-console:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - assay-api
    ports:
      - "5175:5175"

